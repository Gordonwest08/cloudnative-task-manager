
# .github/workflows/ci.yml
#
# CI Pipeline — runs on every Pull Request
# Validates code, builds images, runs tests
# Does NOT deploy — deploy only happens on merge to main
#
# Jobs:
#   1. lint-and-test  — validates backend code
#   2. build-images   — builds Docker images to catch build errors early
#   3. terraform-validate — validates Terraform syntax

name: CI — Pull Request Checks

on:
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  # ── Job 1: Backend lint and test ──────────────────────────────────
  lint-and-test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: app/backend
        run: npm install

      - name: Check backend starts correctly
        working-directory: app/backend
        run: |
          # Verify the entry point exists and has no syntax errors
          node --check src/index.js
          echo "✅ Backend syntax valid"

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

      - name: Verify frontend build output exists
        run: |
          ls app/frontend/dist/
          echo "✅ Frontend build successful"

  # ── Job 2: Build Docker images ────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install --legacy-peer-deps

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          push: false
          tags: taskmanager/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: app/frontend
          push: false
          tags: taskmanager/frontend:test
          build-args: |
            VITE_API_URL=http://localhost:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Images built successfully
        run: echo "✅ Both Docker images built successfully"

  # ── Job 3: Terraform validate ─────────────────────────────────────
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Format Check
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          echo "✅ Terraform formatting valid"
        continue-on-error: true

      - name: Terraform Init (bootstrap)
        working-directory: bootstrap
        run: |
          terraform init -backend=false
          echo "✅ Bootstrap init valid"

      - name: Terraform Validate (bootstrap)
        working-directory: bootstrap
        run: |
          terraform validate
          echo "✅ Bootstrap validate passed"

      - name: Terraform Init (main)
        working-directory: terraform
        run: |
          terraform init -backend=false
          echo "✅ Terraform init valid"

      - name: Terraform Validate (main)
        working-directory: terraform
        run: |
          terraform validate
          echo "✅ Terraform validate passed"
